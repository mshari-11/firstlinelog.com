<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' cdn.jsdelivr.net unpkg.com api.mapbox.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com api.mapbox.com; font-src fonts.gstatic.com; connect-src 'self' *.supabase.co https://*.execute-api.*.amazonaws.com api.mapbox.com *.tiles.mapbox.com events.mapbox.com; img-src 'self' data: blob: api.mapbox.com *.tiles.mapbox.com; worker-src blob:; child-src blob:; frame-src 'none'; object-src 'none';">
<title>خريطة التوزيع - فيرست لاين لوجستيكس</title>
<link rel="icon" href="/public/favicon.ico">
<link rel="stylesheet" href="/fll-design-system.css">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/lucide@0.468.0"></script>
<script src="/fll-shared.js"></script>
<style>
/* Page-specific: Dispatch Map */
.dispatch-layout {
  display: grid;
  grid-template-columns: 320px 1fr;
  height: calc(100vh - 56px);
  overflow: hidden;
}

.dispatch-sidebar {
  background: var(--fll-surface);
  border-left: 1px solid var(--fll-border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--fll-border);
}

.sidebar-title {
  font-size: 16px;
  font-weight: 700;
  color: white;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
}

.search-box {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--fll-border);
  border-radius: 10px;
  font-family: inherit;
  font-size: 13px;
  background: var(--fll-bg);
  color: var(--fll-text);
  transition: border-color 0.2s;
}

.search-box:focus {
  outline: none;
  border-color: var(--fll-accent);
  box-shadow: 0 0 0 3px var(--fll-accent-glow);
}

.sidebar-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 12px 20px;
  border-bottom: 1px solid var(--fll-border);
}

.mini-stat {
  background: rgba(255,255,255,0.03);
  border-radius: 10px;
  padding: 10px 12px;
  text-align: center;
  border: 1px solid var(--fll-border);
}

.mini-stat-value {
  font-size: 20px;
  font-weight: 700;
  color: white;
}

.mini-stat-label {
  font-size: 10px;
  color: var(--fll-text-secondary);
  margin-top: 2px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.driver-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.driver-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
  border: 1px solid transparent;
  margin-bottom: 4px;
}

.driver-card:hover {
  background: rgba(56,189,248,0.05);
  border-color: var(--fll-border);
}

.driver-card.active {
  background: rgba(56,189,248,0.1);
  border-color: rgba(56,189,248,0.3);
}

.driver-avatar {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 14px;
  color: white;
  flex-shrink: 0;
}

.driver-avatar.online { background: linear-gradient(135deg, #059669, #10b981); }
.driver-avatar.idle { background: linear-gradient(135deg, #d97706, #f59e0b); }
.driver-avatar.offline { background: linear-gradient(135deg, #6b7280, #9ca3af); }

.driver-info { flex: 1; min-width: 0; }
.driver-name { font-size: 13px; font-weight: 600; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.driver-meta { font-size: 11px; color: var(--fll-text-secondary); display: flex; align-items: center; gap: 6px; margin-top: 2px; }

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.status-dot.online { background: #10b981; box-shadow: 0 0 8px rgba(16,185,129,0.5); }
.status-dot.idle { background: #f59e0b; box-shadow: 0 0 8px rgba(245,158,11,0.4); }
.status-dot.offline { background: #6b7280; }

.map-container {
  position: relative;
  width: 100%;
  height: 100%;
}

#map {
  width: 100%;
  height: 100%;
}

.map-overlay-stats {
  position: absolute;
  top: 16px;
  left: 16px;
  display: flex;
  gap: 8px;
  z-index: 10;
}

.map-pill {
  background: rgba(10,22,40,0.9);
  backdrop-filter: blur(12px);
  border: 1px solid var(--fll-border);
  border-radius: 10px;
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  font-weight: 600;
  color: white;
  font-family: 'IBM Plex Sans Arabic', sans-serif;
}

.map-pill .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.map-pill .dot.green { background: #10b981; box-shadow: 0 0 6px rgba(16,185,129,0.5); }
.map-pill .dot.yellow { background: #f59e0b; }
.map-pill .dot.gray { background: #6b7280; }

.map-controls {
  position: absolute;
  bottom: 24px;
  left: 16px;
  display: flex;
  gap: 8px;
  z-index: 10;
}

.map-btn {
  background: rgba(10,22,40,0.9);
  backdrop-filter: blur(12px);
  border: 1px solid var(--fll-border);
  border-radius: 10px;
  padding: 10px 16px;
  font-family: 'IBM Plex Sans Arabic', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: background 0.2s, border-color 0.2s;
}

.map-btn:hover {
  background: rgba(56,189,248,0.15);
  border-color: rgba(56,189,248,0.3);
}

.map-btn.active {
  background: rgba(56,189,248,0.2);
  border-color: rgba(56,189,248,0.4);
  color: var(--fll-accent);
}

/* Mapbox popup override */
.mapboxgl-popup-content {
  background: rgba(10,22,40,0.95) !important;
  backdrop-filter: blur(12px);
  border: 1px solid rgba(56,189,248,0.15) !important;
  border-radius: 12px !important;
  padding: 14px 18px !important;
  color: #e2e8f0 !important;
  font-family: 'IBM Plex Sans Arabic', sans-serif !important;
  direction: rtl;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4) !important;
  min-width: 200px;
}

.mapboxgl-popup-tip {
  border-top-color: rgba(10,22,40,0.95) !important;
}

.mapboxgl-popup-close-button {
  color: #94a3b8 !important;
  font-size: 18px !important;
  padding: 4px 8px !important;
}

.popup-name { font-size: 14px; font-weight: 700; color: white; margin-bottom: 6px; }
.popup-row { font-size: 12px; color: #94a3b8; margin-bottom: 3px; display: flex; align-items: center; gap: 6px; }
.popup-badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 600; }
.popup-badge.online { background: rgba(16,185,129,0.15); color: #6ee7b7; }
.popup-badge.idle { background: rgba(245,158,11,0.15); color: #fcd34d; }
.popup-badge.offline { background: rgba(107,114,128,0.15); color: #d1d5db; }

/* No-token notice */
.no-token-notice {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  text-align: center;
  padding: 40px;
  background: var(--fll-bg);
}

.no-token-notice i { margin-bottom: 16px; }
.no-token-notice h2 { font-size: 20px; font-weight: 700; color: white; margin-bottom: 8px; }
.no-token-notice p { font-size: 14px; color: var(--fll-text-secondary); max-width: 400px; line-height: 1.7; }

/* Live pulse animation for map markers */
@keyframes marker-pulse {
  0% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
  70% { box-shadow: 0 0 0 12px rgba(16,185,129,0); }
  100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
}

.marker-online { animation: marker-pulse 2s infinite; }

@media (max-width: 768px) {
  .dispatch-layout {
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr;
  }
  .dispatch-sidebar {
    max-height: 40vh;
    border-left: none;
    border-bottom: 1px solid var(--fll-border);
  }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <h1><i data-lucide="map" style="width:20px;height:20px;color:var(--fll-success)"></i> خريطة التوزيع</h1>
  <div class="top-bar-nav">
    <a href="/admin-dashboard.html"><i data-lucide="shield" style="width:14px;height:14px"></i> الإدارة</a>
    <a href="/staff-ops.html"><i data-lucide="radar" style="width:14px;height:14px"></i> العمليات</a>
    <a href="/staff-finance.html"><i data-lucide="wallet" style="width:14px;height:14px"></i> المالية</a>
    <a href="/dispatch-map.html" class="active"><i data-lucide="map" style="width:14px;height:14px"></i> الخريطة</a>
  </div>
  <div class="top-bar-actions">
    <span style="font-size:12px;color:var(--fll-text-secondary)"><span class="status-dot online" style="display:inline-block;vertical-align:middle;margin-left:4px"></span> مباشر</span>
    <span id="user-name" style="font-size:13px"></span>
    <button onclick="logout()"><i data-lucide="log-out" style="width:14px;height:14px"></i> خروج</button>
  </div>
</div>

<!-- DISPATCH LAYOUT -->
<div class="dispatch-layout">

  <!-- SIDEBAR: Driver List -->
  <div class="dispatch-sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title"><i data-lucide="users" style="width:18px;height:18px;color:var(--fll-accent)"></i> المناديب</div>
      <input type="text" class="search-box" id="driver-search" placeholder="بحث بالاسم أو المدينة..." oninput="filterDrivers(this.value)">
    </div>

    <div class="sidebar-stats">
      <div class="mini-stat">
        <div class="mini-stat-value" id="count-online">—</div>
        <div class="mini-stat-label" style="color:#10b981">متصل</div>
      </div>
      <div class="mini-stat">
        <div class="mini-stat-value" id="count-idle">—</div>
        <div class="mini-stat-label" style="color:#f59e0b">في مهمة</div>
      </div>
      <div class="mini-stat">
        <div class="mini-stat-value" id="count-offline">—</div>
        <div class="mini-stat-label" style="color:#6b7280">غير متصل</div>
      </div>
      <div class="mini-stat">
        <div class="mini-stat-value" id="count-total">—</div>
        <div class="mini-stat-label">الإجمالي</div>
      </div>
    </div>

    <div class="driver-list" id="driver-list"></div>
  </div>

  <!-- MAP -->
  <div class="map-container">
    <div id="map"></div>

    <!-- Map overlay stats -->
    <div class="map-overlay-stats">
      <div class="map-pill"><span class="dot green"></span> <span id="pill-online">0</span> متصل</div>
      <div class="map-pill"><span class="dot yellow"></span> <span id="pill-idle">0</span> في مهمة</div>
      <div class="map-pill"><span class="dot gray"></span> <span id="pill-offline">0</span> غير متصل</div>
    </div>

    <!-- Map controls -->
    <div class="map-controls">
      <button class="map-btn active" onclick="toggleLayer('all',this)"><i data-lucide="layers" style="width:14px;height:14px"></i> الكل</button>
      <button class="map-btn" onclick="toggleLayer('online',this)"><i data-lucide="wifi" style="width:14px;height:14px"></i> المتصلين</button>
      <button class="map-btn" onclick="toggleLayer('idle',this)"><i data-lucide="truck" style="width:14px;height:14px"></i> في مهمة</button>
      <button class="map-btn" onclick="fitAll()"><i data-lucide="maximize-2" style="width:14px;height:14px"></i> عرض الكل</button>
    </div>

    <!-- No token fallback -->
    <div class="no-token-notice" id="no-token" style="display:none">
      <i data-lucide="map-pin-off" style="width:48px;height:48px;color:var(--fll-text-secondary)"></i>
      <h2>خريطة Mapbox غير مُفعّلة</h2>
      <p>أضف <code>MAPBOX_TOKEN</code> في Vercel Dashboard ← Settings ← Environment Variables ثم أعد النشر</p>
    </div>
  </div>

</div>

<script>
const user = checkAuth();
if (!user) throw 'no auth';
setUserInfo(user);
const db = initSupabase();

let map = null;
let markers = [];
let allDrivers = [];
let activeFilter = 'all';

// Saudi Arabia center (Riyadh)
const SA_CENTER = [46.6753, 24.7136];
const SA_ZOOM = 5.5;

// City coordinates for drivers without GPS
const CITY_COORDS = {
  'الرياض': [46.6753, 24.7136],
  'جدة': [39.1925, 21.4858],
  'مكة': [39.8579, 21.3891],
  'المدينة': [39.6142, 24.4539],
  'الدمام': [50.1033, 26.4207],
  'الخبر': [50.2083, 26.2172],
  'تبوك': [36.5662, 28.3838],
  'أبها': [42.5053, 18.2164],
  'القصيم': [43.9750, 26.3260],
  'حائل': [41.6908, 27.5114],
  'نجران': [44.1277, 17.4924],
  'جازان': [42.5511, 16.8892],
  'الباحة': [41.4683, 20.0000],
  'الطائف': [40.4168, 21.2703],
  'ينبع': [38.0618, 24.0895],
  'خميس مشيط': [42.7230, 18.3066],
};

// Randomize position slightly around city center for visual spread
function jitter(coords) {
  return [
    coords[0] + (Math.random() - 0.5) * 0.08,
    coords[1] + (Math.random() - 0.5) * 0.08
  ];
}

// Simulate driver status based on their data
function getDriverStatus(d) {
  if (d.status === 'active') {
    // Simulate: ~40% online, ~30% in-task, ~30% idle
    const hash = (d.id || '').toString().split('').reduce((a, c) => a + c.charCodeAt(0), 0);
    if (hash % 10 < 4) return 'online';
    if (hash % 10 < 7) return 'idle';
    return 'online';
  }
  return 'offline';
}

function getStatusLabel(s) {
  return s === 'online' ? 'متصل' : s === 'idle' ? 'في مهمة' : 'غير متصل';
}

function getStatusColor(s) {
  return s === 'online' ? '#10b981' : s === 'idle' ? '#f59e0b' : '#6b7280';
}

// Create custom marker element
function createMarkerEl(driver) {
  const el = document.createElement('div');
  const status = driver._status;
  const color = getStatusColor(status);
  el.style.cssText = `width:32px;height:32px;border-radius:50%;background:${color};border:3px solid rgba(255,255,255,0.9);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white;box-shadow:0 2px 8px rgba(0,0,0,0.3);transition:transform 0.2s;`;
  if (status === 'online') el.classList.add('marker-online');
  el.textContent = (driver.full_name_ar || driver.full_name || '?')[0];
  el.addEventListener('mouseenter', () => el.style.transform = 'scale(1.3)');
  el.addEventListener('mouseleave', () => el.style.transform = 'scale(1)');
  return el;
}

// Build popup HTML
function popupHTML(d) {
  return `
    <div class="popup-name">${esc(d.full_name_ar || d.full_name || '—')}</div>
    <div class="popup-row"><span class="popup-badge ${d._status}">${getStatusLabel(d._status)}</span></div>
    <div class="popup-row"><strong>المدينة:</strong> ${esc(d.city || '—')}</div>
    <div class="popup-row"><strong>المنصة:</strong> ${esc(d.platform || '—')}</div>
    <div class="popup-row"><strong>الجوال:</strong> ${esc(d.phone || '—')}</div>
    <div class="popup-row"><strong>نوع المركبة:</strong> ${esc(d.vehicle_type || '—')}</div>
  `;
}

// Render driver list in sidebar
function renderDriverList(drivers) {
  const list = document.getElementById('driver-list');
  list.innerHTML = drivers.map((d, i) => `
    <div class="driver-card" data-idx="${i}" onclick="focusDriver(${i})">
      <div class="driver-avatar ${d._status}">${(d.full_name_ar || d.full_name || '?')[0]}</div>
      <div class="driver-info">
        <div class="driver-name">${esc(d.full_name_ar || d.full_name || '—')}</div>
        <div class="driver-meta">
          <span class="status-dot ${d._status}"></span>
          ${getStatusLabel(d._status)} — ${esc(d.city || '—')}
        </div>
      </div>
    </div>
  `).join('');
}

// Update stat counts
function updateStats(drivers) {
  const online = drivers.filter(d => d._status === 'online').length;
  const idle = drivers.filter(d => d._status === 'idle').length;
  const offline = drivers.filter(d => d._status === 'offline').length;

  document.getElementById('count-online').textContent = online;
  document.getElementById('count-idle').textContent = idle;
  document.getElementById('count-offline').textContent = offline;
  document.getElementById('count-total').textContent = drivers.length;

  document.getElementById('pill-online').textContent = online;
  document.getElementById('pill-idle').textContent = idle;
  document.getElementById('pill-offline').textContent = offline;
}

// Add markers to map
function addMarkers(drivers) {
  // Clear existing
  markers.forEach(m => m.remove());
  markers = [];

  drivers.forEach(d => {
    if (!d._coords) return;
    if (activeFilter !== 'all' && d._status !== activeFilter) return;

    const el = createMarkerEl(d);
    const popup = new mapboxgl.Popup({ offset: 25, closeButton: true })
      .setHTML(popupHTML(d));

    const marker = new mapboxgl.Marker({ element: el })
      .setLngLat(d._coords)
      .setPopup(popup)
      .addTo(map);

    markers.push(marker);
  });
}

// Focus on a specific driver
function focusDriver(idx) {
  const d = allDrivers[idx];
  if (!d || !d._coords || !map) return;

  // Highlight card
  document.querySelectorAll('.driver-card').forEach(c => c.classList.remove('active'));
  document.querySelector(`.driver-card[data-idx="${idx}"]`)?.classList.add('active');

  map.flyTo({ center: d._coords, zoom: 13, duration: 1200 });

  // Open popup
  markers.forEach(m => {
    const lngLat = m.getLngLat();
    if (Math.abs(lngLat.lng - d._coords[0]) < 0.001 && Math.abs(lngLat.lat - d._coords[1]) < 0.001) {
      m.togglePopup();
    }
  });
}

// Filter drivers by search
function filterDrivers(query) {
  const q = query.trim().toLowerCase();
  const filtered = q
    ? allDrivers.filter(d => (d.full_name_ar || '').includes(q) || (d.full_name || '').toLowerCase().includes(q) || (d.city || '').includes(q))
    : allDrivers;
  renderDriverList(filtered);
}

// Toggle map layer filter
function toggleLayer(filter, btn) {
  activeFilter = filter;
  document.querySelectorAll('.map-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  addMarkers(allDrivers);
}

// Fit map to show all markers
function fitAll() {
  if (!map || markers.length === 0) return;
  const bounds = new mapboxgl.LngLatBounds();
  markers.forEach(m => bounds.extend(m.getLngLat()));
  map.fitBounds(bounds, { padding: 60, duration: 1000 });
}

// Initialize map
async function initMap() {
  // Fetch token from API
  let token = '';
  try {
    const res = await fetch('/api/mapbox-config');
    const data = await res.json();
    token = data.token || '';
  } catch (e) {
    console.warn('Could not fetch Mapbox token from API');
  }

  if (!token) {
    document.getElementById('map').style.display = 'none';
    document.querySelector('.map-overlay-stats').style.display = 'none';
    document.querySelector('.map-controls').style.display = 'none';
    document.getElementById('no-token').style.display = 'flex';
    return;
  }

  mapboxgl.accessToken = token;

  map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/dark-v11',
    center: SA_CENTER,
    zoom: SA_ZOOM,
    attributionControl: false
  });

  map.addControl(new mapboxgl.NavigationControl(), 'bottom-right');
  map.addControl(new mapboxgl.AttributionControl({ compact: true }), 'bottom-right');

  map.on('load', () => {
    loadDrivers();
  });
}

// Load drivers from Supabase
async function loadDrivers() {
  const { data: couriers } = await db.from('couriers').select('*');
  if (!couriers) return;

  allDrivers = couriers.map(d => {
    d._status = getDriverStatus(d);
    // Use GPS coords if available, otherwise use city coords with jitter
    if (d.latitude && d.longitude) {
      d._coords = [parseFloat(d.longitude), parseFloat(d.latitude)];
    } else if (d.city && CITY_COORDS[d.city]) {
      d._coords = jitter(CITY_COORDS[d.city]);
    } else {
      // Default to Riyadh with jitter
      d._coords = jitter(SA_CENTER);
    }
    return d;
  });

  updateStats(allDrivers);
  renderDriverList(allDrivers);
  if (map) addMarkers(allDrivers);
}

// Auto-refresh every 30 seconds
setInterval(() => {
  if (map) loadDrivers();
}, 30000);

// Boot
initMap();
try { lucide.createIcons(); } catch(e) {}
</script>
</body>
</html>
