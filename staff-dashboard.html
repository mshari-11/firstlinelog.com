<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>بوابة الموظفين - فيرست لاين</title>
<script>
// Staff users get redirected to admin dashboard with staff tab active
const user = JSON.parse(localStorage.getItem('fll_user') || 'null');
if (!user) { window.location.href = '/unified-login'; }
else {
  const groups = user.groups || [];
  // Admin can access everything
  if (groups.includes('admin') || groups.includes('SystemAdmin')) {
    window.location.href = '/admin-dashboard.html#staff';
  } else {
    // Staff portal - redirect to admin dashboard 
    window.location.href = '/admin-dashboard.html#staff';
  }
}
</script>
</head><body><p style="text-align:center;padding:60px;font-family:Tajawal,sans-serif">جاري التحويل...</p></body></html>
