<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>غير مصرح — FLL</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;600;700&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Noto Sans Arabic', sans-serif;
      background: #0f2744;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-align: center;
      padding: 20px;
    }
    .wrap { max-width: 400px; }
    .icon { font-size: 64px; margin-bottom: 20px; }
    h1 { font-size: 24px; margin-bottom: 12px; }
    p { color: #94a3b8; font-size: 15px; margin-bottom: 24px; line-height: 1.7; }
    a {
      display: inline-block;
      padding: 12px 32px;
      background: #f59e0b;
      color: #0f2744;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 15px;
    }
    a:hover { background: #d97706; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">🚫</div>
    <h1>غير مصرح لك بالدخول</h1>
    <p>ليس لديك صلاحية للوصول إلى هذه الصفحة.<br>تواصل مع الإدارة إذا كنت تعتقد أن هذا خطأ.</p>
    <a href="/">العودة للرئيسية</a>
  </div>
</body>
</html>
